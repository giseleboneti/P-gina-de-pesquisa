<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pesquise aqui!</title>
  <link rel="icon" href="pienso.png">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f690;
      text-align: center;
      margin-top: 15%
    }
    h1 {
      font-size: 48px;
      color: #050505;
    }
    input[type="text"] {
      width: 400px;
      padding: 12px;
      font-size: 16px;
      border: 3px solid #eeea0c;
      border-radius: 24px;
      outline: none;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      background: #eeea0c;
      color: rgb(12, 12, 12);
      cursor: pointer;
    }
    img {
        position: fixed;
        right: 10px;
        width: 15%;
        bottom: 10px;
    }
  </style>
</head>
<body>

  <h1>Pesquise aqui!</h1>

  <form action="https://www.google.com/search" method="GET">
    <input type="text" name="q" placeholder="Pesquisar no Google..." required>
    <br>
    <button type="submit">Pesquisar</button>
  </form>
  <img src="pienso.png" alt="img">

</body>
</html>
